<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chef AI · Assistente di Cucina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-icon">🍳</div>
    <div class="header-text">
      <h1>Chef AI</h1>
      <p>Assistente di Cucina</p>
    </div>
    <button id="themeToggle" aria-label="Cambia tema" onclick="toggleTheme()">☀️</button>
  </header>

  <div id="messagesWrap">
    <div id="messages">

      <div class="welcome" id="welcomeBlock">
        <div class="welcome-icon">🍽️</div>
        <h2>Cosa cuciniamo oggi?</h2>
        <p>Chiedi ricette, tecniche, abbinamenti o suggerimenti su qualsiasi ingrediente.</p>
        <div class="welcome-chips">
          <button class="chip" onclick="fillInput(this)">Ricetta pasta al pomodoro</button>
          <button class="chip" onclick="fillInput(this)">Come fare il risotto perfetto?</button>
          <button class="chip" onclick="fillInput(this)">Sostituto delle uova in pasticceria</button>
          <button class="chip" onclick="fillInput(this)">Abbinamento vino e pesce</button>
        </div>
      </div>

      <div id="typing">
        <div class="ai-chip">
          <div class="ai-avatar">🍳</div>
          <span class="ai-name">Chef AI</span>
        </div>
        <div class="typing-bubble">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>

    <button id="scrollBtn" aria-label="Scorri in fondo" onclick="scrollToBottom()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <polyline points="5 12 12 19 19 12"/>
      </svg>
    </button>
  </div>

  <div class="input-bar">
    <div class="input-box">
      <textarea
        id="userInput"
        placeholder="Scrivi una domanda sulla cucina…"
        autocomplete="off"
        rows="1"
      ></textarea>
      <button onclick="sendMessage()" id="sendBtn" aria-label="Invia">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
    <p class="hint">Premi <kbd>Shift+Enter</kbd> per andare a capo · <kbd>Enter</kbd> per inviare</p>
  </div>

  <script src="script.js"></script>

</body>
</html>
